info:
  name: Matches - PATCH /matches/:id/players
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/matches/:id/players"
  body:
    type: json
    data: |-
      {
        "playerIds": [
          "<playerId1>",
          "<playerId2>",
          "<playerId3>"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Reemplaza la convocatoria completa del partido.
  Reemplazar :id por el id del partido y los <playerIdN> por ids de jugadores reales.
  Retorna el partido con los jugadores populados.
