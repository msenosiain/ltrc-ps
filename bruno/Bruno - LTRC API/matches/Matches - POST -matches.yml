info:
  name: Matches - POST /matches
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/matches'
  body:
    type: json
    data: |-
      {
        "date": "07/03/2026",
        "opponent": "Rivadavia RC",
        "venue": "Cancha Marista RC",
        "isHome": true,
        "type": "league",
        "status": "upcoming",
        "tournament": "699fa5ec6b5405fb342ae673",
        "selectedPlayers": [],
        "notes": "Primera Fecha "
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  - date: formato dd/MM/yyyy
  - type: league | friendly | cup
  - status: upcoming | completed | cancelled (default: upcoming)
  - tournament: id del torneo (opcional)
  - selectedPlayers: array de ids de jugadores (opcional)
