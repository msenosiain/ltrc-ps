info:
  name: Matches - GET /matches (paginated)
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/matches?page=1&size=10&seaarch=Rivada'
  params:
    - name: page
      value: '1'
      type: query
    - name: size
      value: '10'
      type: query
    - name: seaarch
      value: Rivada
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Filtros opcionales (agregar como query params):
  - status: upcoming | completed | cancelled
  - type: league | friendly | cup
  - tournament: <tournamentId>
  - fromDate: 2025-01-01
  - toDate: 2025-12-31
  - sortBy: date
  - sortOrder: asc | desc
