services:
  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  - type: web
    name: ltrc-campo-api
    runtime: node
    region: ohio
    plan: starter
    buildCommand: NODE_ENV=development npm ci && npx nx build api --configuration=production --skip-nx-cache
    startCommand: node dist/apps/api/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3000
      - key: API_GLOBAL_PREFIX
        value: /api/v1
      - key: API_CORS_ALLOWED_ORIGINS
        value: https://campo.lostordos.com.ar
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard — use MongoDB Atlas URI
      - key: AUTH_JWT_SECRET
        sync: false   # Generate: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: AUTH_REFRESH_JWT_SECRET
        sync: false
      - key: GOOGLE_AUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_AUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_AUTH_ALLOWED_DOMAIN
        value: lostordos.com.ar
      - key: GOOGLE_AUTH_REDIRECT_URL
        value: https://campo-be.lostordos.com.ar/api/v1/auth/google/redirect
      - key: GOOGLE_AUTH_CALLBACK_URL
        value: https://campo.lostordos.com.ar/auth/callback
      - key: ACCESS_LOG_THRESHOLD
        value: 30

  # ── UI (Angular) ─────────────────────────────────────────────────────────────
  - type: web
    name: ltrc-campo-ui
    runtime: static
    buildCommand: npm ci && npx nx build ui --configuration=production --skip-nx-cache
    staticPublishPath: dist/apps/ui/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
