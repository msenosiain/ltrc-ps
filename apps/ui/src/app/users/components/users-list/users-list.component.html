<div class="users-list">
  <div class="list-header">
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="goToCreate()"
    >
      <mat-icon>person_add</mat-icon>
      Nuevo usuario
    </button>
  </div>

  <ltrc-user-search [initialFilters]="savedState?.filters" (filtersChange)="applyFilters($event)" />

  @if (dataSource.loading$ | async) {
  <mat-progress-bar mode="indeterminate" />
  }

  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    matSortActive="name"
    matSortDirection="asc"
    class="users-table mat-elevation-z2"
  >
    <!-- Nombre -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Apellido y Nombre
      </th>
      <td mat-cell *matCellDef="let user">{{ user.name }}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <!-- Roles -->
    <ng-container matColumnDef="roles">
      <th mat-header-cell *matHeaderCellDef>Roles</th>
      <td mat-cell *matCellDef="let user">
        <div class="roles-chips">
          @for (role of user.roles; track role) {
          <mat-chip [ngClass]="getRoleClass(role)">{{
            getRoleLabel(role)
          }}</mat-chip>
          }
        </div>
      </td>
    </ng-container>

    <!-- Categorías -->
    <ng-container matColumnDef="categories">
      <th mat-header-cell *matHeaderCellDef>Categorías</th>
      <td mat-cell *matCellDef="let user">
        {{ getCategoriesLabel(user) }}
      </td>
    </ng-container>

    <!-- Ramas -->
    <ng-container matColumnDef="branches">
      <th mat-header-cell *matHeaderCellDef>Ramas</th>
      <td mat-cell *matCellDef="let user">
        {{ user.branches?.join(', ') || '' }}
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let user">
        <mat-icon class="row-arrow">chevron_right</mat-icon>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="viewUser(row)"
      class="user-row"
    ></tr>
  </table>

  <mat-paginator
    [length]="dataSource.total"
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  />
</div>
