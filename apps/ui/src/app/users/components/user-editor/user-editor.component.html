<div class="user-editor">

  <div class="editor-header">
    <h2 class="editor-title">{{ editing ? 'Editar usuario' : 'Nuevo usuario' }}</h2>

    @if (editing && user) {
      <button mat-stroked-button color="warn" type="button" class="delete-btn" (click)="onDelete()">
        <mat-icon>delete</mat-icon>
        Eliminar usuario
      </button>
    }

    @if (submitting) {
      <mat-progress-bar mode="indeterminate" />
    }
  </div>

  <ltrc-user-form
    [user]="user"
    [submitting]="submitting"
    (formSubmit)="onFormSubmit($event)"
    (cancel)="onCancel()"
  />

</div>
