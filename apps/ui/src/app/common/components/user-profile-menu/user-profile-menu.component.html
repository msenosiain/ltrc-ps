@if (currentUser(); as user) {
<div class="user-info" [matMenuTriggerFor]="userMenu">
  <div class="user-name-row">
    @if (viewAsService.viewAsRole()) {
    <mat-icon class="view-as-indicator" matTooltip="Modo vista activo">visibility</mat-icon>
    }
    <span class="user-name">{{ user.name }}</span>
    <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
  </div>
  <span class="user-role" [class]="primaryRoleClass()">{{
    primaryRoleLabel()
  }}</span>
</div>
<mat-menu #userMenu="matMenu">
  @if (isAdmin()) {
  <button mat-menu-item [matMenuTriggerFor]="viewAsMenu">
    <mat-icon>visibility</mat-icon>
    <span>Ver como</span>
    @if (viewAsService.viewAsRole()) {
    <span class="view-as-active-dot"></span>
    }
  </button>
  <mat-menu #viewAsMenu="matMenu">
    <button mat-menu-item (click)="viewAsService.set(null)">
      <mat-icon>person</mat-icon>
      <span>Rol real</span>
    </button>
    @for (opt of viewAsRoleOptions; track opt.id) {
    <button mat-menu-item (click)="viewAsService.set(opt.id)">
      @if (viewAsService.viewAsRole() === opt.id) {
      <mat-icon>check</mat-icon>
      } @else {
      <mat-icon></mat-icon>
      }
      <span>{{ opt.label }}</span>
    </button>
    }
  </mat-menu>
  <mat-divider />
  }
  @if (canSetPassword()) {
  <button mat-menu-item routerLink="/dashboard/set-password">
    <mat-icon>lock</mat-icon>
    <span>Configurar contraseña</span>
  </button>
  <mat-divider />
  }
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Cerrar sesión</span>
  </button>
</mat-menu>
}
