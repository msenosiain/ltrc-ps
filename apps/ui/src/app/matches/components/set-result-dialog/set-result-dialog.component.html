<h2 mat-dialog-title>Resultado del partido</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="result-form">
    <mat-form-field appearance="outline">
      <mat-label>LTRC</mat-label>
      <input matInput type="number" min="0" formControlName="homeScore" />
    </mat-form-field>

    <span class="separator">-</span>

    <mat-form-field appearance="outline">
      <mat-label>{{ data.match.opponent || 'Rival' }}</mat-label>
      <input matInput type="number" min="0" formControlName="awayScore" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="save()">Guardar</button>
</mat-dialog-actions>
