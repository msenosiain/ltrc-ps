<div class="match-editor">
  <div class="sticky-toolbar">
    <div class="sticky-toolbar__title">
      <span class="sticky-toolbar__name">
        {{ editing ? 'Editar partido' : 'Nuevo partido' }}
      </span>
    </div>
    <div class="sticky-toolbar__actions">
      <button mat-stroked-button type="button" (click)="onCancel()">
        <mat-icon>arrow_back</mat-icon>
        Cancelar
      </button>
      @if (editing && match) {
      <button
        mat-stroked-button
        color="warn"
        type="button"
        (click)="onDelete()"
      >
        <mat-icon>delete</mat-icon>
        Eliminar partido
      </button>
      }
      <button
        mat-flat-button
        color="primary"
        type="submit"
        form="matchForm"
        [disabled]="submitting"
      >
        <mat-icon>{{ match ? 'save' : 'add' }}</mat-icon>
        {{ match ? 'Actualizar partido' : 'Crear partido' }}
      </button>
    </div>
  </div>

  @if (submitting) {
  <mat-progress-bar mode="indeterminate" />
  }

  @if (loading) {
  <ltrc-form-skeleton [rows]="8" />
  } @else {
  <ltrc-match-form
    [match]="match"
    [submitting]="submitting"
    (formSubmit)="onFormSubmit($event)"
    (cancel)="onCancel()"
  />
  }
</div>
