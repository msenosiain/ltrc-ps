<div class="forgot-password-container">
  <mat-card class="forgot-password-card">
    <mat-card-content>
      @if (isLoading) {
        <mat-progress-bar mode="indeterminate" />
      }

      <form (submit)="onSubmit()">
        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput [formControl]="emailControl" type="email" autocomplete="email" placeholder="email@ejemplo.com" />
          @if (emailControl.hasError('required')) {
            <mat-error>El email es requerido</mat-error>
          }
          @if (emailControl.hasError('email')) {
            <mat-error>Formato de email inválido</mat-error>
          }
        </mat-form-field>

        @if (errorMessage) {
          <div class="error-message">{{ errorMessage }}</div>
        }

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="emailControl.invalid || isLoading">
            Enviar enlace
          </button>
          <a mat-button routerLink="/login">Cancelar</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
