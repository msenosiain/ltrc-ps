<div class="players-list">

  <div class="list-header">
    <button mat-flat-button color="primary" type="button" (click)="goToCreate()">
      <mat-icon>person_add</mat-icon>
      Agregar jugador
    </button>
  </div>

  <ltrc-player-search (filtersChange)="applyFilters($event)" />

  <table mat-table [dataSource]="dataSource" matSort class="players-table mat-elevation-z2">

    <!-- Foto -->
    <ng-container matColumnDef="photoId">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let player">
        <img
          [src]="getPlayerPhotoUrl(player.id)"
          alt="{{ player.firstName }} {{ player.lastName }}"
          class="player-photo"
        />
      </td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let player">{{ player.firstName }}</td>
    </ng-container>

    <!-- Apellido -->
    <ng-container matColumnDef="lastName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
      <td mat-cell *matCellDef="let player">{{ player.lastName }}</td>
    </ng-container>

    <!-- Apodo -->
    <ng-container matColumnDef="nickName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Apodo</th>
      <td mat-cell *matCellDef="let player">{{ player.nickName }}</td>
    </ng-container>

    <!-- Posicion -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Posicion</th>
      <td mat-cell *matCellDef="let player">{{ getPositionLabel(player.position) }}</td>
    </ng-container>

    <!-- Posicion alternativa -->
    <ng-container matColumnDef="alternatePosition">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Pos. alternativa</th>
      <td mat-cell *matCellDef="let player">{{ getPositionLabel(player.alternatePosition) }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="viewPlayerDetails(row.id)"
      class="player-row"
    ></tr>

  </table>

  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  />

</div>
