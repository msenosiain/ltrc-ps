<div class="player-editor">

  <div class="editor-header">
    <h2 class="editor-title">{{ editing ? 'Editar jugador' : 'Nuevo jugador' }}</h2>

    @if (editing && player) {
      <button mat-stroked-button color="warn" type="button" class="delete-btn" (click)="onDelete()">
        <mat-icon>delete</mat-icon>
        Eliminar jugador
      </button>
    }

    @if (submitting) {
      <mat-progress-bar mode="indeterminate" />
    }
  </div>

  <ltrc-player-form
    [player]="player"
    [submitting]="submitting"
    (formSubmitWithPhoto)="onFormSubmitWithPhoto($event)"
    (cancel)="onCancel()"
  />

</div>
