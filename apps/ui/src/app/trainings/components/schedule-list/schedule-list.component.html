<div class="schedules-list">
  <div class="list-header">
    <h2 class="list-header__title">Horarios</h2>
    <div class="list-header__actions">
      <button
        *ltrcAllowedRoles="[RoleEnum.MANAGER, RoleEnum.ADMIN, RoleEnum.COORDINATOR]"
        mat-flat-button
        color="primary"
        type="button"
        (click)="goToCreate()"
      >
        <mat-icon>add</mat-icon>
        Agregar horario
      </button>
    </div>
  </div>

  <ltrc-schedule-search
    [initialFilters]="savedState?.filters"
    (filtersChange)="applyFilters($event)"
  />

  @if (dataSource.loading$ | async) {
  <mat-progress-bar mode="indeterminate" />
  }

  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    matSortActive="sport"
    matSortDirection="asc"
    class="schedules-table mat-elevation-z2"
  >
    <!-- Deporte -->
    <ng-container matColumnDef="sport">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Deporte</th>
      <td mat-cell *matCellDef="let schedule">
        {{ getSportLabel(schedule) }}
      </td>
    </ng-container>

    <!-- Categoría -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Categoría</th>
      <td mat-cell *matCellDef="let schedule">
        {{ getCategoryLabel(schedule) }}
      </td>
    </ng-container>

    <!-- Horarios -->
    <ng-container matColumnDef="timeSlots">
      <th mat-header-cell *matHeaderCellDef>Horarios</th>
      <td mat-cell *matCellDef="let schedule">
        {{ getTimeSlotsLabel(schedule) }}
      </td>
    </ng-container>

    <!-- Activo -->
    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let schedule">
        <span
          class="active-badge"
          [class.active]="schedule.isActive"
          [class.inactive]="!schedule.isActive"
        >
          {{ schedule.isActive ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="viewDetails(row.id)"
      class="schedule-row"
    ></tr>
  </table>

  <mat-paginator
    [length]="dataSource.total"
    [pageSize]="25"
    [pageSizeOptions]="[10, 25, 50, 100]"
    showFirstLastButtons
  />
</div>
