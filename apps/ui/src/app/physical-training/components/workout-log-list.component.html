<div class="workout-log-list">
  <div class="workout-log-list__header">
    <h2>Registros de entrenamiento</h2>
  </div>

  <div class="workout-log-list__filters">
    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select [(ngModel)]="selectedStatus" (ngModelChange)="applyFilters()">
        <mat-option value="">Todos</mat-option>
        <mat-option value="in_progress">En progreso</mat-option>
        <mat-option value="completed">Completado</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Desde</mat-label>
      <input matInput type="date" [(ngModel)]="dateFrom" (change)="applyFilters()" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Hasta</mat-label>
      <input matInput type="date" [(ngModel)]="dateTo" (change)="applyFilters()" />
    </mat-form-field>
  </div>

  @if (dataSource.loading$ | async) {
    <mat-progress-bar mode="indeterminate" />
  }

  <table mat-table [dataSource]="dataSource" class="workout-log-list__table">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let log">{{ log.date }}</td>
    </ng-container>
    <ng-container matColumnDef="player">
      <th mat-header-cell *matHeaderCellDef>Jugador</th>
      <td mat-cell *matCellDef="let log">{{ getPlayerName(log) }}</td>
    </ng-container>
    <ng-container matColumnDef="routine">
      <th mat-header-cell *matHeaderCellDef>Rutina</th>
      <td mat-cell *matCellDef="let log">{{ getRoutineName(log) }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let log">
        <span class="status-badge status-badge--{{ log.status }}">{{ getStatusLabel(log.status) }}</span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let log">
        <button mat-icon-button (click)="viewLog(log.id)" title="Ver detalle">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="workout-log-list__row"></tr>
  </table>

  <mat-paginator [length]="dataSource.total" [pageSize]="25" [pageSizeOptions]="[10, 25, 50]" />
</div>
