<div class="tournaments-list">
  <div class="list-header">
    <button
      *ltrcAllowedRoles="[RoleEnum.MANAGER, RoleEnum.COORDINATOR, RoleEnum.ADMIN]"
      mat-flat-button
      color="primary"
      type="button"
      (click)="goToCreate()"
    >
      <mat-icon>add</mat-icon>
      Agregar torneo
    </button>
  </div>

  <ltrc-tournament-search [initialFilters]="savedState?.filters" (filtersChange)="applyFilters($event)" />

  @if (dataSource.loading$ | async) {
  <mat-progress-bar mode="indeterminate" />
  }

  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    matSortActive="season"
    matSortDirection="desc"
    class="tournaments-table mat-elevation-z2"
  >
    <!-- Nombre -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let tournament">{{ tournament.name }}</td>
    </ng-container>

    <!-- Temporada -->
    <ng-container matColumnDef="season">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Temporada</th>
      <td mat-cell *matCellDef="let tournament">{{ tournament.season }}</td>
    </ng-container>

    <!-- Deporte -->
    <ng-container matColumnDef="sport">
      <th mat-header-cell *matHeaderCellDef>Deporte</th>
      <td mat-cell *matCellDef="let tournament">
        {{ getSportLabel(tournament.sport) }}
      </td>
    </ng-container>

    <!-- Categorías -->
    <ng-container matColumnDef="categories">
      <th mat-header-cell *matHeaderCellDef>Categorías</th>
      <td mat-cell *matCellDef="let tournament">
        {{ getCategoriesLabel(tournament.categories) }}
      </td>
    </ng-container>

    <!-- Tipo -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let tournament">
        {{ getTypeLabel(tournament.type) }}
      </td>
    </ng-container>

    <!-- Descripción -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let tournament">
        {{ tournament.description }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="viewTournamentDetails(row.id)"
      class="tournament-row"
    ></tr>
  </table>

  <mat-paginator
    [length]="dataSource.total"
    [pageSize]="savedState?.pageSize ?? 25"
    [pageSizeOptions]="[10, 25, 50, 100]"
    showFirstLastButtons
  />
</div>
